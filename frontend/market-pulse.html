<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AuroraAI Market Pulse</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="expectation-gap.css">
  <link rel="stylesheet" href="market-pulse.css">
</head>
<body>
<main class="app-shell market-pulse-shell">
  <nav class="site-nav"><a href="/">最近分红</a><a href="/expectation-gap">预期差</a><a class="active" href="/market-pulse.html">Market Pulse</a><a href="/data-source-health">数据源状态</a></nav>
  <header class="topbar pulse-header">
    <div><p class="eyebrow">AuroraAI</p><h1>Market Pulse</h1><p class="pulse-alias">板块脉搏</p><p class="subtitle">追踪行业趋势强度与数据源状态。</p></div>
    <button id="refresh-sectors" type="button">刷新板块数据</button>
  </header>

  <div id="pulse-error" class="api-error" role="alert" hidden></div>
  <section id="market-summary" class="market-summary" aria-label="市场摘要">
    <div><span>数据源</span><strong id="current-source">申万一级行业</strong></div>
    <div><span>最新交易日</span><strong id="last-trade-date">加载中…</strong></div>
    <div><span>当前状态</span><strong id="market-status">加载中…</strong></div>
    <div><span>最近更新时间</span><strong id="last-refresh">加载中…</strong></div>
  </section>

  <section id="sector-table-card" class="dashboard-card sector-table-card">
    <div class="section-heading"><h2>行业趋势排名</h2><span id="sector-count">加载中…</span></div>
    <div class="sector-filters" aria-label="行业快速筛选">
      <label><span>搜索行业</span><input id="sector-search" type="search" placeholder="输入行业名称"></label>
      <label><span>等级</span><select id="level-filter"><option value="">全部</option><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option></select></label>
      <label><span>数据源</span><select id="source-filter"><option value="all">全部数据源</option><option value="sw_l1" selected>申万一级</option><option value="sw_l2">申万二级</option><option value="eastmoney">东方财富</option></select></label>
      <button id="reset-sector-filters" type="button" class="secondary-button">重置</button>
    </div>
    <div id="sector-error" class="card-error" role="alert" hidden></div>
    <div class="table-region pulse-table-wrap">
      <table class="pulse-table">
        <thead><tr>
          <th><button class="sort-button" data-sort="rank" type="button">Rank</button></th>
          <th><button class="sort-button" data-sort="sector_name" type="button">行业</button></th>
          <th><button class="sort-button active" data-sort="trend_score" type="button">Trend Score <span class="sort-indicator">↓</span></button></th>
          <th><button class="sort-button" data-sort="level" type="button">等级</button></th>
          <th><button class="sort-button" data-sort="trade_date" type="button">最新交易日</button></th>
          <th class="secondary-column"><button class="sort-button" data-sort="updated_at" type="button">更新时间</button></th>
          <th class="secondary-column"><button class="sort-button" data-sort="source" type="button">数据来源</button></th>
        </tr></thead>
        <tbody id="sector-rows"><tr><td colspan="7" class="empty-state">正在加载行业数据…</td></tr></tbody>
      </table>
    </div>
  </section>

  <section class="dashboard-lower">
    <article id="source-health-card" class="dashboard-card source-health-card">
      <h2>数据源健康</h2><div id="health-error" class="card-error" role="alert" hidden></div>
      <div id="source-statuses" class="source-statuses"><div class="loading-card">正在加载数据源状态…</div></div>
    </article>
    <article id="refresh-job-card" class="dashboard-card refresh-job-card">
      <h2>刷新任务</h2>
      <dl class="job-details">
        <div><dt>状态</dt><dd id="job-status">尚未刷新</dd></div>
        <div><dt>进度</dt><dd id="job-counts">—</dd></div>
        <div><dt>当前步骤</dt><dd id="job-step">—</dd></div>
        <div><dt>开始时间</dt><dd id="job-started">—</dd></div>
        <div><dt>完成时间</dt><dd id="job-finished">—</dd></div>
        <div><dt>耗时</dt><dd id="job-duration">—</dd></div>
      </dl>
      <progress id="job-progress" max="100" value="0"></progress>
      <div id="job-error" class="card-error" role="alert" hidden></div>
    </article>
  </section>

  <aside class="future-note">更多市场广度指标将在后续版本加入。</aside>
</main>
<script src="market-pulse.js"></script>
</body>
</html>
