<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AuroraAI Upcoming Dividends</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AuroraAI</p>
          <h1>Upcoming Dividends</h1>
        </div>
        <div class="run-meta">
          <span id="row-count">-- rows</span>
          <span id="generated-at">Waiting for data</span>
        </div>
      </header>

      <section class="toolbar" aria-label="Upcoming dividend controls">
        <label class="search-field">
          <span>&#31579;&#36873;</span>
          <input id="search-input" type="search" placeholder="&#20195;&#30721;&#25110;&#21517;&#31216;" autocomplete="off" />
        </label>
        <button id="reload-button" type="button">&#21047;&#26032;</button>
      </section>

      <section class="table-region" aria-label="Upcoming dividend table">
        <table>
          <thead>
            <tr>
              <th><button type="button" class="sort-button" data-column="0">&#25490;&#21517;</button></th>
              <th><button type="button" class="sort-button" data-column="1">&#30331;&#35760;&#26085;</button></th>
              <th><button type="button" class="sort-button" data-column="2">&#32929;&#31080;</button></th>
              <th><button type="button" class="sort-button" data-column="3">&#27599;10&#32929;&#27966;&#24687;</button></th>
              <th><button type="button" class="sort-button" data-column="4">&#26368;&#26032;&#32929;&#20215;</button></th>
              <th><button type="button" class="sort-button" data-column="5">&#26412;&#27425;&#32929;&#24687;&#29575;</button></th>
            </tr>
          </thead>
          <tbody id="dividend-body">
            <tr>
              <td colspan="6" class="empty-state">Loading...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
